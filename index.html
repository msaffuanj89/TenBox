<style>
:root{--bg:#f6f7fb;--card:#fff;--ink:#202431;--blue:#1137ff;--red:#f21d1d;--green:#1aa65b;--orange:#f97316}

.welcome{position:fixed;inset:0;background:radial-gradient(circle at top,#fff,#eef4ff);z-index:20;display:flex;align-items:center;justify-content:center;padding:20px}.welcome-card{width:min(820px,96vw);background:#fff;border-radius:34px;padding:32px;box-shadow:0 22px 70px #0002;text-align:center}.logo{width:min(320px,70vw);margin:auto;display:block;animation:fadeIn .8s ease-out both}.owner{margin:8px 0 26px}.owner div:first-child{font-size:26px;font-weight:900;animation:flyIn .8s ease .3s both;opacity:0}.owner div:last-child{font-size:18px;font-weight:800;color:#58627a;margin-top:6px;animation:flyIn .8s ease .65s both;opacity:0}.welcome-actions{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}.welcome-actions button{min-height:170px;color:white;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:8px}.add{background:linear-gradient(135deg,#1aa65b,#34c978)}.sub{background:linear-gradient(135deg,#3156ff,#1936a8)}.count{background:linear-gradient(135deg,#f59e0b,#f97316)}.sym{font-size:68px;line-height:.9}.title{font-size:30px}.en{font-size:18px;opacity:.9}@keyframes fadeIn{from{opacity:0;transform:scale(.92)}to{opacity:1;transform:scale(1)}}@keyframes flyIn{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
.page{flex:1;min-height:0}.operation{display:grid;grid-template-columns:1.15fr .85fr;gap:14px}.panel{background:white;border-radius:22px;padding:18px;box-shadow:0 12px 35px #0001;overflow:hidden}.visual{display:grid;grid-template-columns:1fr 1fr;gap:12px;height:100%}.place-title{text-align:center;font-size:28px;font-weight:900;color:#555;margin-bottom:10px}.frames{display:flex;flex-wrap:wrap;gap:14px;justify-content:center;align-items:flex-start}.tenframe{display:grid;grid-template-columns:repeat(2,48px);grid-template-rows:repeat(5,48px);width:100px;height:242px;border:2px solid #000;background:white}.cell{border:1px solid #000;display:flex;align-items:center;justify-content:center}.dot{width:40px;height:40px;border-radius:50%;box-shadow:inset 0 -3px 3px #0003}.red{background:var(--red)}.blue{background:var(--blue)}.crossed{position:relative;opacity:.75}.crossed:before,.crossed:after{content:"";position:absolute;left:7px;right:7px;top:16px;height:3px;background:#111;border-radius:3px}.crossed:before{transform:rotate(45deg)}.crossed:after{transform:rotate(-45deg)}

.calc{width:min(470px,100%);margin:0 auto;font-size:82px;color:#555;display:flex;flex-direction:column;align-items:center}.labels,.row{display:grid;grid-template-columns:70px 150px 150px;align-items:center;justify-items:center}.answer-row{display:grid;grid-template-columns:70px 150px 168px;align-items:center;justify-items:center}.labels{font-size:27px;font-weight:900}.row{min-height:110px}.carry-row{min-height:58px}.op{font-size:88px}.line,.answer-line{height:8px;background:#555;border-radius:6px;width:300px;margin-left:79px;margin-right:0}.line{margin-top:8px;margin-bottom:14px}.answer-line{margin-top:14px;margin-bottom:0}.num,.ans,.carry{width:132px;height:100px;border-radius:20px;font-size:70px;text-align:center;background:#fff;border:4px solid #ccc;font-weight:900}.ans{border-color:#999}.ans-wrap{position:relative;width:156px;height:100px;overflow:visible}.ans-wrap .ans{position:absolute;inset:0;width:156px;min-width:156px}.ans.two-digit{font-size:62px;letter-spacing:-3px;padding-left:0;padding-right:0}.ans.ghost-active{color:transparent;caret-color:#222}.ans-ghost{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:62px;font-weight:900;letter-spacing:-3px;white-space:nowrap;pointer-events:none;overflow:visible}#ansOnes{width:156px!important;min-width:156px!important;text-align:center!important;overflow:visible!important;box-sizing:border-box!important;padding-left:0!important;padding-right:0!important;font-variant-numeric:tabular-nums!important}#ansOnes.two-digit{font-size:52px!important;letter-spacing:-6px!important}.ghost-carry-digit{color:#b8b8b8}.ghost-ones-digit{color:#222}.ans.correct{border-color:var(--green);background:#effff5}.ans.wait{background:#fff3b0}.carry{width:78px;height:56px;font-size:42px;border:2px dashed #999;color:var(--green);background:#f7fff9}.carry.active{border-color:var(--green)}.stack{position:relative;width:132px;height:100px}.stack .num{position:absolute;inset:0}.borrowBox{position:absolute;left:9px;top:18px;width:38px;height:46px;border:2px dashed var(--green);border-radius:9px;background:#f7fff9;color:var(--green);font-size:25px;font-weight:900;text-align:center;z-index:5}.slash{position:absolute;left:34px;right:34px;top:56px;height:4px;background:#333;border-radius:4px;transform:rotate(-28deg)}.newTens{position:absolute;top:8px;right:12px;font-size:32px;font-weight:900}.hint{text-align:center;margin-top:14px;font-size:20px;font-weight:900;min-height:28px}.step{display:none}
.counting-page{background:linear-gradient(135deg,#ffffff 0%,#eef5ff 50%,#fff4df 100%);border-radius:22px;box-shadow:0 12px 35px #0001;height:100%;padding:clamp(22px,2.5vw,34px);display:flex;flex-direction:column;gap:clamp(18px,2vw,28px);overflow:hidden}.counting-page .counting-head{display:flex;justify-content:space-between;align-items:center;gap:clamp(14px,2vw,24px);flex-wrap:wrap;background:white;border-radius:28px;padding:clamp(16px,2vw,24px) clamp(20px,2.5vw,32px);box-shadow:0 10px 24px #00000010}.counting-page h2{margin:0;font-size:clamp(34px,3.2vw,52px);line-height:1.05;font-weight:900;color:#1f2a44;letter-spacing:-.5px}.counting-tabs{display:flex;gap:clamp(12px,1.5vw,20px);flex-wrap:wrap}.counting-tabs button{background:#e9e9ef;color:#222;font-size:clamp(18px,1.35vw,24px);line-height:1.05;padding:clamp(14px,1.35vw,20px) clamp(18px,1.7vw,28px);border-radius:22px;box-shadow:none}.counting-tabs button.active{background:#222;color:white;box-shadow:0 10px 20px #0002}.counting-card{flex:1;min-height:0;background:rgba(255,255,255,.78);border:2px solid rgba(17,55,255,.08);border-radius:34px;padding:clamp(30px,3vw,48px);display:grid;grid-template-columns:minmax(0,1.08fr) minmax(0,.92fr);gap:clamp(24px,3vw,48px);align-items:center;justify-items:stretch;box-shadow:inset 0 0 0 1px #fff8,0 14px 36px #0000000d}.counting-left,.counting-right{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:clamp(24px,3vh,40px);min-height:0;height:100%}.counting-prompt{font-size:clamp(30px,2.6vw,46px);font-weight:900;text-align:center;color:#1f2a44;line-height:1.12;letter-spacing:-.3px;max-width:760px}.counting-number-card{width:clamp(240px,20vw,360px);height:clamp(180px,16vw,270px);border-radius:40px;background:linear-gradient(135deg,#ffffff,#eef4ff);border:5px solid #d9e4ff;box-shadow:0 20px 38px #1137ff24;display:flex;align-items:center;justify-content:center;font-size:clamp(104px,8.7vw,164px);line-height:1;font-weight:900;color:var(--blue)}.counting-answer{width:clamp(240px,20vw,340px);height:clamp(130px,11vw,190px);border-radius:34px;border:6px solid #c9d0df;font-size:clamp(72px,6vw,112px);line-height:1;font-weight:900;text-align:center;background:white;box-shadow:0 14px 28px #00000012}.counting-answer:focus{outline:6px solid #cce3ff;border-color:#3478f6}.counting-actions{display:flex;gap:clamp(14px,1.6vw,24px);flex-wrap:wrap;justify-content:center}.counting-actions button{background:#222;color:white;font-size:clamp(19px,1.45vw,26px);line-height:1.05;padding:clamp(16px,1.45vw,24px) clamp(22px,2vw,34px);border-radius:24px;box-shadow:0 10px 22px #0002}.counting-actions button.secondary{background:#e9e9ef;color:#222;box-shadow:none}.counting-feedback{min-height:52px;font-size:clamp(24px,2vw,36px);line-height:1.1;font-weight:900;text-align:center;padding:10px 18px;border-radius:22px}.counting-feedback.ok{color:var(--green);background:#eafff2}.counting-feedback.no{color:#d61f1f;background:#fff0f0}.counting-dot-bank{display:flex;gap:clamp(16px,1.5vw,24px);flex-wrap:wrap;justify-content:center;max-width:min(620px,100%);background:white;border-radius:32px;padding:clamp(22px,2vw,34px);box-shadow:0 12px 26px #0000000f}.counting-bank-dot{width:clamp(70px,5.5vw,94px);height:clamp(70px,5.5vw,94px);border-radius:50%;background:var(--blue);box-shadow:inset 0 -5px 6px #0003,0 10px 18px #1137ff30;cursor:grab}.counting-build-cell{cursor:pointer}.counting-build-cell.filled:before{content:"";width:48px;height:48px;border-radius:50%;background:var(--blue);box-shadow:inset 0 -3px 3px #0003,0 4px 10px #1137ff30}.counting-tenframe{grid-template-columns:repeat(2,clamp(72px,7.2vw,118px));grid-template-rows:repeat(5,clamp(72px,7.2vw,118px));width:calc(clamp(72px,7.2vw,118px) * 2 + 4px);height:calc(clamp(72px,7.2vw,118px) * 5 + 4px);border:4px solid #000;transform:none;margin:clamp(12px,2vw,26px)}.counting-tenframe .cell{border:2px solid #000}.counting-tenframe .dot{width:clamp(58px,5.8vw,94px);height:clamp(58px,5.8vw,94px)}.counting-tenframe .counting-build-cell.filled:before{width:clamp(58px,5.8vw,94px);height:clamp(58px,5.8vw,94px)}
@media(max-width:1100px){
  html,body{overflow:auto;height:auto;min-width:1200px;scroll-behavior:smooth;-webkit-text-size-adjust:100%}
  .app{width:1200px;min-width:1200px;height:100vh;min-height:760px}
  .answer-row{grid-template-columns:70px 150px 168px}
  .ans-wrap{width:156px;height:100px;overflow:visible}
  #ansOnes{width:156px;min-width:156px;font-size:58px;line-height:1;letter-spacing:-5px;padding:0 2px;text-align:center;overflow:visible;box-sizing:border-box;direction:ltr;font-variant-numeric:tabular-nums;-webkit-appearance:none;appearance:none}

  .floating-dot,.floating-carry,.tenframe-transfer{position:fixed!important;z-index:9999!important;pointer-events:none!important}
}

@media(max-width:600px){
  html,body{overflow:auto;height:auto;min-width:1200px}
  .app{width:1200px;min-width:1200px;height:100vh;min-height:760px}
}

<body>
<div class="app">
  <div id="welcome" class="welcome"><div class="welcome-card"><svg class="logo" viewBox="0 0 420 260"><rect x="120" y="8" width="180" height="140" rx="28" fill="#1137ff"/><rect x="138" y="44" width="144" height="72" rx="10" fill="#fff"/><g stroke="#1137ff" stroke-width="4"><line x1="138" y1="80" x2="282" y2="80"/><line x1="166.8" y1="44" x2="166.8" y2="116"/><line x1="195.6" y1="44" x2="195.6" y2="116"/><line x1="224.4" y1="44" x2="224.4" y2="116"/><line x1="253.2" y1="44" x2="253.2" y2="116"/></g><circle cx="152" cy="62" r="9" fill="#f21d1d"/><circle cx="181" cy="62" r="9" fill="#f21d1d"/><circle cx="210" cy="62" r="9" fill="#f21d1d"/><circle cx="239" cy="62" r="9" fill="#f21d1d"/><circle cx="268" cy="62" r="9" fill="#f21d1d"/><circle cx="152" cy="98" r="9" fill="#1137ff"/><circle cx="181" cy="98" r="9" fill="#1137ff"/><circle cx="210" cy="98" r="9" fill="#1137ff"/><circle cx="239" cy="98" r="9" fill="#1137ff"/><circle cx="288" cy="28" r="28" fill="#1aa65b" stroke="#fff" stroke-width="6"/><text x="288" y="37" text-anchor="middle" font-size="24" font-family="Arial" font-weight="900" fill="#fff">10</text><text x="210" y="214" text-anchor="middle" font-size="62" font-family="Arial" font-weight="900"><tspan fill="#1137ff">Ten</tspan><tspan fill="#f21d1d">Box</tspan></text></svg><div class="owner"><div>Muhammad Saffuan bin Jaffar</div><div>IPG Kampus Pulau Pinang</div></div><div class="welcome-actions"><button class="add" id="btnAdd"><span class="sym">+</span><span class="title">TAMBAH</span><span class="en">ADDITION</span></button><button class="sub" id="btnSub"><span class="sym">−</span><span class="title">TOLAK</span><span class="en">SUBTRACTION</span></button><button class="count" id="btnCount"><span class="sym" style="font-size:52px">123</span><span class="title">MENGIRA</span><span class="en">COUNTING</span></button></div></div></div>

<script>
(function(){
'use strict';
const $=id=>document.getElementById(id), sleep=ms=>new Promise(r=>setTimeout(r,ms));
const state={mode:'add',lang:'BM',locked:true,soundOn:true,audioCtx:null,welcomeSoundPlayed:false,running:false,borrowAnimated:false,regrouped:false,frameMoved:false,readyToMoveFrame:false};
const countingState={mode:'how',targetNumber:0,shownDots:0,builtDots:0};
function t(bm,en){return state.lang==='BM'?bm:en}function ct(bm,en){return t(bm,en)}
function tone(f,d=.06){if(!state.soundOn)return;try{if(!state.audioCtx){const A=window.AudioContext||window.webkitAudioContext;if(!A)return;state.audioCtx=new A()}const c=state.audioCtx;if(c.state==='suspended')c.resume();const o=c.createOscillator(),g=c.createGain();o.frequency.value=f;g.gain.value=.025;o.connect(g);g.connect(c.destination);o.start();o.stop(c.currentTime+d)}catch(e){}}
function sound(n){if(n==='done'){tone(660);setTimeout(()=>tone(880),80);setTimeout(()=>tone(1046),160)}else tone(n==='wrong'?180:n==='carry'?740:520,.07)}
function welcomeSound(){if(state.welcomeSoundPlayed)return;state.welcomeSoundPlayed=true;[392,523,659,784].forEach((f,i)=>setTimeout(()=>tone(f,.12),i*45));}
function showPage(page){$('welcome').classList.toggle('hidden',page!=='welcome');$('operationPage').classList.toggle('hidden',page!=='operation');$('countingPage').classList.toggle('hidden',page!=='counting')}
function choose(mode){welcomeSound();if(mode==='count'){showPage('counting');newCountingQuestion();return}state.mode=mode;clearAll();updateUI();showPage('operation')}
function main(){showPage('welcome')}function digit(id){const n=parseInt($(id).value||'0',10);return Number.isFinite(n)?Math.max(0,Math.min(9,n)):0}
function values(){const tt=digit('topTens'),to=digit('topOnes'),bt=digit('bottomTens'),bo=digit('bottomOnes'),top=tt*10+to,bottom=bt*10+bo,final=state.mode==='add'?top+bottom:top-bottom;return{tt,to,bt,bo,top,bottom,final,onesSum:to+bo,carry:Math.floor((to+bo)/10),borrow:to<bo?1:0,finalTens:Math.floor(Math.max(0,final)/10),finalOnes:((final%10)+10)%10}}
function sync(){const v=values();$('opSymbol').textContent=state.mode==='add'?'+':'−';const carryShow=state.mode==='add'&&$('topOnes').value!==''&&$('bottomOnes').value!==''&&v.carry>0;$('carryRow').classList.toggle('hidden',!carryShow);$('carryTens').classList.toggle('hidden',!carryShow);if(!carryShow)$('carryTens').value='';const borrowShow=state.mode==='sub'&&$('topOnes').value!==''&&$('bottomOnes').value!==''&&v.borrow===1;$('borrowOnes').classList.toggle('hidden',!borrowShow);if(!borrowShow)$('borrowOnes').value='';if(v.final<0||v.final>99){$('hint').textContent=t('Jawapan mesti antara 0 hingga 99 sahaja.','The answer must be between 0 and 99.');return null}return v}
function frame(count,color,build=false){const f=document.createElement('div');f.className='tenframe';for(let i=0;i<10;i++){const c=document.createElement('div');c.className='cell'+(build?' counting-build-cell':'');if(build){c.onclick=()=>{c.classList.toggle('filled');countingState.builtDots=document.querySelectorAll('#countLeft .counting-build-cell.filled').length};c.ondragover=e=>e.preventDefault();c.ondrop=e=>{e.preventDefault();c.classList.add('filled');countingState.builtDots=document.querySelectorAll('#countLeft .counting-build-cell.filled').length}}else if(i<count){const d=document.createElement('div');d.className='dot '+color;c.appendChild(d)}f.appendChild(c)}return f}
function draw(){const v=sync();$('tensFrames').innerHTML='';$('onesFrames').innerHTML='';$('borrowMark').classList.add('hidden');if(!v)return;const tensCount=state.mode==='add'?v.tt+v.bt:v.tt;for(let i=0;i<tensCount;i++)$('tensFrames').appendChild(frame(10,'red'));if(v.to>0)$('onesFrames').appendChild(frame(v.to,'blue'));if(state.mode==='add'&&v.bo>0)$('onesFrames').appendChild(frame(v.bo,'blue'))}
function rect(el){return el.getBoundingClientRect()}function clearCarryGhostInOnes(){const g=$('ansOnesGhost');if(!g)return;g.classList.add('hidden');g.querySelector('.ghost-carry-digit').textContent='';g.querySelector('.ghost-ones-digit').textContent='';$('ansOnes').classList.remove('ghost-active')}function showCarryGhostInOnes(v){const g=$('ansOnesGhost');if(!g||v.length<2)return;g.querySelector('.ghost-carry-digit').textContent=v[0];g.querySelector('.ghost-ones-digit').textContent=v.slice(1);g.classList.remove('hidden');$('ansOnes').classList.add('ghost-active')}
function resetState(){state.running=false;state.borrowAnimated=false;state.regrouped=false;state.frameMoved=false;state.readyToMoveFrame=false;clearCarryGhostInOnes();['ansOnes','ansTens'].forEach(id=>$(id).className='ans');$('carryTens').classList.remove('active');$('borrowMark').classList.add('hidden');$('hint').textContent=''}
function resetAll(){$('ansOnes').value='';$('ansTens').value='';$('carryTens').value='';resetState();draw()}function clearAll(){['topTens','topOnes','bottomTens','bottomOnes','ansOnes','ansTens','carryTens','borrowOnes'].forEach(id=>$(id).value='');resetState();$('tensFrames').innerHTML='';$('onesFrames').innerHTML='';sync()}
function updateUI(){document.documentElement.lang=state.lang==='BM'?'ms':'en';$('btnMain').textContent=t('UTAMA','MAIN');$('btnLang').textContent=state.lang==='BM'?'EN':'BM';$('btnOp').textContent=state.mode==='add'?t('Operasi: Tambah','Operation: Add'):t('Operasi: Tolak','Operation: Subtract');$('btnReset').textContent=t('Ulang','Repeat');$('btnClear').textContent=t('Padam','Clear');$('btnLock').textContent=state.locked?t('🔒 Kunci','🔒 Lock'):t('🔓 Buka Kunci','🔓 Unlock');$('btnSound').textContent=state.soundOn?t('🔊 Bunyi','🔊 Sound'):t('🔇 Senyap','🔇 Mute');$('btnHint').textContent=t('Hint Bayangan','Ghost Hint');$('btnDemo').textContent=t('Demo Animasi','Animation Demo');$('tensLabel').textContent=t('Puluh','Tens');$('onesLabel').textContent=t('Sa','Ones');$('calcTensLabel').textContent=t('Puluh','Tens');$('calcOnesLabel').textContent=t('Sa','Ones');$('opSymbol').textContent=state.mode==='add'?'+':'−'}
async function animateRegroup(){const v=sync();if(state.running||state.regrouped||!v||v.carry<1)return;state.running=true;const frames=[...document.querySelectorAll('#onesFrames .tenframe')];if(frames.length<2){state.running=false;return}const data=frames.map((fr,i)=>({fr,i,dots:[...fr.querySelectorAll('.dot.blue')]}));let source,target;const isFive=data.length>=2&&data[0].dots.length===5&&data[1].dots.length===5;if(isFive){console.log('[Add 5+5] detected');console.log('[Add 5+5] move right dots to left frame');target=data[0];source=data[1]}else{source=[...data].sort((a,b)=>a.dots.length-b.dots.length||b.i-a.i)[0];target=[...data].sort((a,b)=>b.dots.length-a.dots.length||a.i-b.i)[0]}const need=10-target.dots.length,cells=[...target.fr.querySelectorAll('.cell')].filter(c=>!c.querySelector('.dot'));for(let i=0;i<Math.min(need,source.dots.length);i++){const m=source.dots[source.dots.length-1-i],cell=cells[i];if(!m||!cell)break;const a=rect(m),b=rect(cell),clone=m.cloneNode(true);clone.className='floating-dot';clone.style.left=a.left+'px';clone.style.top=a.top+'px';clone.style.transform='translateX(0px) translateY(0px)';document.body.appendChild(clone);m.style.opacity='0';await sleep(60);clone.style.transform=`translateX(${b.left-a.left+(b.width-a.width)/2}px) translateY(${b.top-a.top+(b.height-a.height)/2}px)`;await new Promise(res=>{let done=false;const finish=()=>{if(done)return;done=true;res()};clone.addEventListener('transitionend',finish,{once:true});setTimeout(finish,580)});cell.appendChild(m);m.style.opacity='1';clone.remove();await sleep(50)}if(isFive)console.log('[Add 5+5] left frame complete 10');state.regrouped=true;state.readyToMoveFrame=true;state.running=false}
async function animateCarry(){const v=sync();if(!v||state.mode!=='add'||v.carry<1)return;const raw=$('ansOnes').value.trim();if(raw.length<2)return;const a=rect($('ansOnes')),b=rect($('carryTens')),fl=document.createElement('div');fl.className='floating-carry';fl.textContent=raw[0];const left=a.left+18,top=a.top+(a.height-62)/2;fl.style.left=left+'px';fl.style.top=top+'px';fl.style.transform='translateX(0px) translateY(0px)';document.body.appendChild(fl);await sleep(60);fl.style.transform=`translateX(${b.left-left+(b.width-48)/2}px) translateY(${b.top-top+(b.height-62)/2}px)`;await new Promise(res=>{let done=false;const finish=()=>{if(done)return;done=true;res()};fl.addEventListener('transitionend',finish,{once:true});setTimeout(finish,760)});fl.remove();$('carryTens').value='';$('ansOnes').value=raw;showCarryGhostInOnes(raw);sound('carry')}
async function moveCompletedTen(){const v=sync();if(state.running||state.frameMoved||!state.readyToMoveFrame||!v)return;if(v.to===5&&v.bo===5)console.log('[Add 5+5] slide full ten-frame to tens');const completed=[...document.querySelectorAll('#onesFrames .tenframe')].find(fr=>fr.querySelectorAll('.dot.blue').length===10);if(!completed)return;state.running=true;const ghost=document.createElement('div');ghost.className='tenframe';ghost.style.opacity='0';$('tensFrames').appendChild(ghost);const a=rect(completed),b=rect(ghost),clone=completed.cloneNode(true);clone.classList.add('tenframe-transfer');clone.style.left=a.left+'px';clone.style.top=a.top+'px';clone.style.width=a.width+'px';clone.style.height=a.height+'px';clone.style.transform='translateX(0px) translateY(0px)';document.body.appendChild(clone);completed.style.opacity='.2';await sleep(70);clone.style.transform=`translateX(${b.left-a.left}px) translateY(${b.top-a.top}px)`;await new Promise(res=>{let done=false;const finish=()=>{if(done)return;done=true;res()};clone.addEventListener('transitionend',finish,{once:true});setTimeout(finish,820)});clone.querySelectorAll('.dot').forEach(dot=>{dot.classList.remove('blue');dot.classList.add('red')});await sleep(180);clone.remove();ghost.remove();$('tensFrames').appendChild(frame(10,'red'));$('onesFrames').innerHTML='';if(v.finalOnes>0)$('onesFrames').appendChild(frame(v.finalOnes,'blue'));state.frameMoved=true;state.running=false;$('ansTens').focus()}
async function animateBorrow(){if(state.running||state.borrowAnimated)return;const v=sync();if(!v||state.mode!=='sub'||v.borrow!==1)return;const red=[...document.querySelectorAll('#tensFrames .tenframe')].pop();if(!red)return;state.running=true;const ghost=document.createElement('div');ghost.className='tenframe';ghost.style.opacity='0';$('onesFrames').appendChild(ghost);const a=rect(red),b=rect(ghost),clone=red.cloneNode(true);clone.classList.add('borrow-moving');clone.style.left=a.left+'px';clone.style.top=a.top+'px';clone.style.width=a.width+'px';clone.style.height=a.height+'px';clone.style.transform='translateX(0px)';document.body.appendChild(clone);red.classList.add('borrow-source');requestAnimationFrame(()=>clone.style.transform=`translateX(${b.left-a.left}px)`);await new Promise(res=>{let done=false;const finish=()=>{if(done)return;done=true;res()};clone.addEventListener('transitionend',finish,{once:true});setTimeout(finish,760)});clone.remove();ghost.remove();$('onesFrames').appendChild(frame(10,'blue'));state.borrowAnimated=true;state.running=false}
async function markRemoved(count){let r=count;const items=[...document.querySelectorAll('#onesFrames .tenframe')].map((f,i)=>({f,i,dots:[...f.querySelectorAll('.dot.blue:not(.crossed)')]})).filter(x=>x.dots.length).sort((a,b)=>a.dots.length!==b.dots.length?a.dots.length-b.dots.length:a.i-b.i);for(const item of items){for(const d of item.dots){if(r<=0)break;d.classList.add('crossed');r--;await sleep(100)}if(r<=0)break}}
async function animateSubtract(){if(state.running)return;const v=sync();if(!v)return;if(v.borrow===1){if($('borrowOnes').value.trim()!=='1'){$('borrowOnes').focus();return}if(!state.borrowAnimated)return}state.running=true;await markRemoved(v.bo);state.regrouped=true;state.frameMoved=true;state.running=false;$('ansTens').focus()}async function demo(){const v=sync();if(!v)return;if(state.mode==='add'){if(v.carry>0){$('ansOnes').value=String(v.onesSum);await animateRegroup();await animateCarry()}}else{if(v.borrow===1){$('borrowOnes').value='1';showBorrowVisual();await animateBorrow()}$('ansOnes').value=String(v.finalOnes);await animateSubtract()}}
function showBorrowVisual(){const v=sync();if(!v||state.mode!=='sub'||v.borrow!==1||v.tt<1)return;$('newTens').textContent=String(v.tt-1);$('borrowMark').classList.remove('hidden')}
function rand0to10(){return Math.floor(Math.random()*11)}function makeCountingFrame(count,build=false){const f=frame(build?0:count,'blue',build);f.classList.add('counting-tenframe');return f}function newCountingQuestion(){countingState.builtDots=0;if(countingState.mode==='how')countingState.shownDots=rand0to10();if(countingState.mode==='build')countingState.targetNumber=rand0to10();if(countingState.mode==='fill')countingState.shownDots=rand0to10();renderCounting()}function setCountingMode(mode){countingState.mode=mode;newCountingQuestion()}function feedback(ok,msg){const el=$('countFeedback');if(!el)return;el.textContent=msg;el.className='counting-feedback '+(ok?'ok':'no')}function dotBank(){const bank=document.createElement('div');bank.className='counting-dot-bank';for(let i=0;i<10;i++){const d=document.createElement('div');d.className='counting-bank-dot';d.draggable=true;d.ondragstart=e=>e.dataTransfer.setData('text/plain','dot');bank.appendChild(d)}return bank}
function renderCounting(){if(!$('countLeft'))return;$('countingTitle').textContent=ct('Mengira','Counting');$('countHowBtn').textContent=ct('Berapa Banyak?','How Many?');$('countBuildBtn').textContent=ct('Bina','Build');$('countFillBtn').textContent=ct('Isi','Fill');['countHowBtn','countBuildBtn','countFillBtn'].forEach(id=>$(id).classList.remove('active'));if(countingState.mode==='how')$('countHowBtn').classList.add('active');if(countingState.mode==='build')$('countBuildBtn').classList.add('active');if(countingState.mode==='fill')$('countFillBtn').classList.add('active');$('countLeft').innerHTML='';$('countRight').innerHTML='';if(countingState.mode==='how'){$('countLeft').innerHTML='<div class="counting-prompt">'+ct('Berapa Banyak?','How Many?')+'</div>';$('countLeft').appendChild(makeCountingFrame(countingState.shownDots));$('countRight').innerHTML='<input id="countAnswer" class="counting-answer" inputmode="numeric" maxlength="2"><div class="counting-actions"><button id="countCheck">'+ct('Semak','Check')+'</button><button id="countNew" class="secondary">'+ct('Soalan Baru','New Question')+'</button></div><div id="countFeedback" class="counting-feedback"></div>';$('countCheck').onclick=()=>{const ans=parseInt($('countAnswer').value,10);feedback(ans===countingState.shownDots,ans===countingState.shownDots?ct('Betul! Hebat.','Correct! Great job.'):ct('Cuba lagi.','Try again.'))}}else if(countingState.mode==='build'){$('countRight').innerHTML='<div class="counting-prompt">'+ct('Bina nombor ini','Build this number')+'</div><div class="counting-number-card">'+countingState.targetNumber+'</div>';$('countRight').appendChild(dotBank());$('countLeft').appendChild(makeCountingFrame(0,true));$('countLeft').insertAdjacentHTML('beforeend','<div class="counting-actions"><button id="countCheck">'+ct('Semak','Check')+'</button><button id="countClear" class="secondary">'+ct('Padam','Clear')+'</button><button id="countNew" class="secondary">'+ct('Soalan Baru','New Question')+'</button></div><div id="countFeedback" class="counting-feedback"></div>');$('countCheck').onclick=()=>feedback(countingState.builtDots===countingState.targetNumber,countingState.builtDots===countingState.targetNumber?ct('Betul!','Correct!'):ct('Cuba lagi.','Try again.'));$('countClear').onclick=()=>{document.querySelectorAll('#countLeft .counting-build-cell').forEach(c=>c.classList.remove('filled'));countingState.builtDots=0;feedback(true,'')}}else{const need=10-countingState.shownDots;$('countLeft').innerHTML='<div class="counting-prompt">'+ct('Berapa lagi untuk penuh 10?','How many more to make 10?')+'</div>';$('countLeft').appendChild(makeCountingFrame(countingState.shownDots));$('countRight').innerHTML='<input id="countAnswer" class="counting-answer" inputmode="numeric" maxlength="2"><div class="counting-actions"><button id="countCheck">'+ct('Semak','Check')+'</button><button id="countNew" class="secondary">'+ct('Soalan Baru','New Question')+'</button></div><div id="countFeedback" class="counting-feedback"></div>';$('countCheck').onclick=()=>{const ans=parseInt($('countAnswer').value,10);feedback(ans===need,ans===need?ct('Betul!','Correct!'):ct('Cuba lagi.','Try again.'))}}const n=$('countNew');if(n)n.onclick=newCountingQuestion}
function wire(){$('btnAdd').onclick=()=>choose('add');$('btnSub').onclick=()=>choose('sub');$('btnCount').onclick=()=>choose('count');$('btnMain').onclick=main;$('btnLang').onclick=()=>{state.lang=state.lang==='BM'?'EN':'BM';updateUI();if(!$('countingPage').classList.contains('hidden'))renderCounting()};$('btnOp').onclick=()=>{state.mode=state.mode==='add'?'sub':'add';clearAll();updateUI();showPage('operation')};$('btnReset').onclick=resetAll;$('btnClear').onclick=clearAll;$('btnSound').onclick=()=>{state.soundOn=!state.soundOn;updateUI()};$('btnLock').onclick=()=>{state.locked=!state.locked;updateUI()};$('btnHint').onclick=async()=>{const v=sync();if(state.mode==='add'&&v&&v.carry>0&&$('ansOnes').value.trim().length>=2){if(!state.regrouped)await animateRegroup();await animateCarry()}};$('btnDemo').onclick=demo;$('countHowBtn').onclick=()=>setCountingMode('how');$('countBuildBtn').onclick=()=>setCountingMode('build');$('countFillBtn').onclick=()=>setCountingMode('fill');['topTens','topOnes','bottomTens','bottomOnes'].forEach(id=>{$(id).oninput=()=>resetAll()});$('borrowOnes').oninput=async()=>{const v=sync();if(state.mode==='sub'&&v&&v.borrow===1&&$('borrowOnes').value==='1'){showBorrowVisual();await animateBorrow();$('ansOnes').focus()}};$('ansOnes').oninput=async()=>{updateOnesAnswerDisplay();const v=sync();if(!v)return;const val=$('ansOnes').value.trim();if(state.mode==='add'){if(val===String(v.onesSum)&&v.carry>0){$('ansOnes').className='ans correct';if(!state.running){if(!state.regrouped)await animateRegroup();await animateCarry()}}else if(val===String(v.onesSum)){$('ansOnes').className='ans correct';state.regrouped=true;state.frameMoved=true;$('ansTens').focus()}else if(val){$('ansOnes').className='ans wait'}return}if(v.borrow===1&&$('borrowOnes').value!=='1'){$('ansOnes').className='ans wait';$('borrowOnes').focus();return}if(val===String(v.finalOnes)){$('ansOnes').className='ans correct';await animateSubtract()}else if(val){$('ansOnes').className='ans wait'}};$('carryTens').oninput=async()=>{const v=sync();if(!v)return;const raw=$('ansOnes').value.trim();if(state.mode==='add'&&$('carryTens').value===String(v.carry)){if(v.to===5&&v.bo===5)console.log('[Add 5+5] carry typed');if(raw.length>=2){clearCarryGhostInOnes();$('ansOnes').value=raw.slice(1);$('ansOnes').className='ans correct'}await moveCompletedTen()}};$('ansTens').oninput=()=>{const v=sync();if(v&&$('ansTens').value===String(v.finalTens)){$('ansTens').className='ans correct';$('hint').textContent=t('Tahniah!','Well done!');sound('done')}}}
wire();updateUI();showPage('welcome');
})();
</script>
