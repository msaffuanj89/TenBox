function main(){showPage('welcome')}function digit(id){const n=parseInt($(id).value||'0',10);return Number.isFinite(n)?Math.max(0,Math.min(9,n)):0}

async function animateRegroup(){const v=sync();if(state.running||state.regrouped||!v||v.carry<1)return;state.running=true;tabletAddLog('start dot animation',{onesSum:v.onesSum,carry:v.carry});const frames=[...document.querySelectorAll('#onesFrames .tenframe')];if(frames.length<2){state.running=false;tabletAddLog('finish dot animation',{skipped:'not enough frames'});return}const data=frames.map((fr,i)=>({fr,i,dots:[...fr.querySelectorAll('.dot.blue')]}));let source,target;const isFive=data.length>=2&&data[0].dots.length===5&&data[1].dots.length===5;if(isFive){console.log('[Add 5+5] detected');console.log('[Add 5+5] move right dots to left frame');target=data[0];source=data[1]}else{source=[...data].sort((a,b)=>a.dots.length-b.dots.length||b.i-a.i)[0];target=[...data].sort((a,b)=>b.dots.length-a.dots.length||a.i-b.i)[0]}const need=10-target.dots.length,cells=[...target.fr.querySelectorAll('.cell')].filter(c=>!c.querySelector('.dot'));for(let i=0;i<Math.min(need,source.dots.length);i++){const m=source.dots[source.dots.length-1-i],cell=cells[i];if(!m||!cell)break;const a=rect(m),b=rect(cell),clone=m.cloneNode(true);clone.className='floating-dot';clone.style.left=a.left+'px';clone.style.top=a.top+'px';clone.style.transform='translateX(0px) translateY(0px)';document.body.appendChild(clone);tabletAddLog('dot clone coordinates',{from:a,to:b});m.style.opacity='0';await sleep(60);clone.style.transform=`translateX(${b.left-a.left+(b.width-a.width)/2}px) translateY(${b.top-a.top+(b.height-a.height)/2}px)`;await new Promise(res=>{let done=false;const finish=()=>{if(done)return;done=true;res()};clone.addEventListener('transitionend',finish,{once:true});setTimeout(finish,580)});cell.appendChild(m);m.style.opacity='1';clone.remove();await sleep(50)}if(isFive)console.log('[Add 5+5] left frame complete 10');state.regrouped=true;state.readyToMoveFrame=true;state.running=false;tabletAddLog('finish dot animation',{readyToMoveFrame:state.readyToMoveFrame})}
async function animateCarry(){const v=sync();if(!v||state.mode!=='add'||v.carry<1||state.carryHintAnimated)return;const raw=$('ansOnes').value.trim();if(raw.length<2)return;state.carryHintAnimated=true;tabletAddLog('start carry hint',{raw,carry:v.carry});const a=rect($('ansOnes')),b=rect($('carryTens')),fl=document.createElement('div');fl.className='floating-carry';fl.textContent=raw[0];const left=a.left+18,top=a.top+(a.height-62)/2;fl.style.left=left+'px';fl.style.top=top+'px';fl.style.transform='translateX(0px) translateY(0px)';document.body.appendChild(fl);tabletAddLog('carry clone coordinates',{from:{left,top,width:48,height:62},to:b});await sleep(60);fl.style.transform=`translateX(${b.left-left+(b.width-48)/2}px) translateY(${b.top-top+(b.height-62)/2}px)`;await new Promise(res=>{let done=false;const finish=()=>{if(done)return;done=true;res()};fl.addEventListener('transitionend',finish,{once:true});setTimeout(finish,760)});fl.remove();$('carryTens').value='';$('ansOnes').value=raw;showCarryGhostInOnes(raw);sound('carry');tabletAddLog('finish carry hint',{raw})}

async function animateBorrow(){if(state.running||state.borrowAnimated)return;const v=sync();if(!v||state.mode!=='sub'||v.borrow!==1)return;const red=[...document.querySelectorAll('#tensFrames .tenframe')].pop();if(!red)return;state.running=true;const ghost=document.createElement('div');ghost.className='tenframe';ghost.style.opacity='0';$('onesFrames').appendChild(ghost);const a=rect(red),b=rect(ghost),clone=red.cloneNode(true);clone.classList.add('borrow-moving');clone.style.left=a.left+'px';clone.style.top=a.top+'px';clone.style.width=a.width+'px';clone.style.height=a.height+'px';clone.style.transform='translateX(0px)';document.body.appendChild(clone);red.classList.add('borrow-source');requestAnimationFrame(()=>clone.style.transform=`translateX(${b.left-a.left}px)`);await new Promise(res=>{let done=false;const finish=()=>{if(done)return;done=true;res()};clone.addEventListener('transitionend',finish,{once:true});setTimeout(finish,760)});clone.remove();ghost.remove();$('onesFrames').appendChild(frame(10,'blue'));state.borrowAnimated=true;state.running=false}
